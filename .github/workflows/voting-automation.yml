name: Voting automation

# BACKSTOP clock for the voting scheduler. The primary clock is the Cloudflare
# cron Worker in automation/cron-worker/, which runs the same scheduler module
# punctually; this workflow provides redundancy on independent infrastructure
# (GitHub cron routinely fires hours late, which is fine for a backstop). Both
# clocks are safe to overlap thanks to the automation_events idempotency log.
#
# The scheduler moves a round from suggestions to voting on its scheduled open
# date, reveals the winner from the D1 tallies after voting closes, posts the
# matching Discord announcements, and uploads a maintainer handoff artifact when
# a revealed winner still needs manual fields before its homepage card can be
# published.
#
# The scheduler is idempotent (D1 automation_events guard each transition), so the
# daily run and any manual workflow_dispatch reruns will not duplicate phase
# changes, Discord posts, or handoffs. Final homepage publication stays manual via
# MEETING_WORKFLOW.md; this workflow never edits HTML or commits to the repo.

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron is UTC-only and cannot express Europe/Copenhagen with
    # daylight saving time. Trigger at the two possible UTC hours for 09:00 in
    # Denmark, plus a midday backstop in case GitHub drops or heavily delays the
    # morning triggers. The first job step runs the scheduler on any trigger that
    # lands at or after 09:00 local; duplicate same-day runs are no-ops because
    # every scheduler action is guarded by the automation_events idempotency log.
    - cron: "0 7 * * *"
    - cron: "0 8 * * *"
    - cron: "0 12 * * *"

# Read-only: the scheduler talks to the site over HTTPS and only uploads an
# artifact. It never needs to write to the repository.
permissions:
  contents: read
  actions: read

jobs:
  schedule:
    runs-on: ubuntu-latest

    steps:
      - name: Check Copenhagen 09:00 gate
        id: copenhagen_gate
        run: |
          # GitHub cron triggers routinely start 1-4 hours late, so requiring the
          # local hour to be exactly 09 silently skipped the scheduler for days.
          # Run on any trigger at or after 09:00 local instead; the scheduler's
          # automation_events log makes a repeat same-day run a no-op.
          local_time="$(TZ=Europe/Copenhagen date '+%Y-%m-%d %H:%M:%S %Z')"
          local_hour="$(TZ=Europe/Copenhagen date '+%-H')"
          echo "Copenhagen time: ${local_time}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${local_hour}" -ge 9 ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping voting scheduler because it is before 09:00 in Denmark."
          fi

      - uses: actions/checkout@v5
        if: steps.copenhagen_gate.outputs.should_run == 'true'

      - name: Set up Node
        if: steps.copenhagen_gate.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run unit tests
        if: steps.copenhagen_gate.outputs.should_run == 'true'
        run: npm test

      - name: Run the voting scheduler
        if: steps.copenhagen_gate.outputs.should_run == 'true'
        env:
          VOTING_BASE_URL: ${{ secrets.VOTING_BASE_URL }}
          VOTING_ADMIN_TOKEN: ${{ secrets.VOTING_ADMIN_TOKEN }}
          DISCORD_VOTING_WEBHOOK_URL: ${{ secrets.DISCORD_VOTING_WEBHOOK_URL }}
          DISCORD_VOTING_ALERTS_WEBHOOK_URL: ${{ secrets.DISCORD_VOTING_ALERTS_WEBHOOK_URL }}
          HEALTHCHECKS_PING_URL: ${{ secrets.HEALTHCHECKS_PING_URL }}
        run: node automation/voting/cli.mjs

      - name: Upload winner handoff
        # Only runs when the scheduler wrote a handoff into automation-output/.
        # if-no-files-found: ignore keeps a no-op run (most hours) green.
        if: always() && steps.copenhagen_gate.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: winner-handoff
          path: automation-output/*.md
          if-no-files-found: ignore
          retention-days: 30
