name: Voting automation

# Runs the voting scheduler against the live admin API. It moves a round from
# suggestions to voting on its scheduled open date, reveals the winner from the
# D1 tallies after voting closes, posts the matching Discord announcements, and
# uploads a maintainer handoff artifact when a revealed winner still needs manual
# fields before its homepage card can be published.
#
# The scheduler is idempotent (D1 automation_events guard each transition), so the
# daily run and any manual workflow_dispatch reruns will not duplicate phase
# changes, Discord posts, or handoffs. Final homepage publication stays manual via
# MEETING_WORKFLOW.md; this workflow never edits HTML or commits to the repo.

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron is UTC-only and cannot express Europe/Copenhagen with
    # daylight saving time. Trigger at the two possible UTC hours for 09:00 in
    # Denmark, then let the first job step skip whichever one is not 09:00 local.
    - cron: "0 7 * * *"
    - cron: "0 8 * * *"

# Read-only: the scheduler talks to the site over HTTPS and only uploads an
# artifact. It never needs to write to the repository.
permissions:
  contents: read
  actions: read

jobs:
  schedule:
    runs-on: ubuntu-latest

    steps:
      - name: Check Copenhagen 09:00 gate
        id: copenhagen_gate
        run: |
          local_time="$(TZ=Europe/Copenhagen date '+%Y-%m-%d %H:%M:%S %Z')"
          local_hour="$(TZ=Europe/Copenhagen date '+%H')"
          echo "Copenhagen time: ${local_time}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${local_hour}" = "09" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping voting scheduler because it is not 09:00 in Denmark."
          fi

      - uses: actions/checkout@v5
        if: steps.copenhagen_gate.outputs.should_run == 'true'

      - name: Set up Node
        if: steps.copenhagen_gate.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run unit tests
        if: steps.copenhagen_gate.outputs.should_run == 'true'
        run: npm test

      - name: Run the voting scheduler
        if: steps.copenhagen_gate.outputs.should_run == 'true'
        env:
          VOTING_BASE_URL: ${{ secrets.VOTING_BASE_URL }}
          VOTING_ADMIN_TOKEN: ${{ secrets.VOTING_ADMIN_TOKEN }}
          DISCORD_VOTING_WEBHOOK_URL: ${{ secrets.DISCORD_VOTING_WEBHOOK_URL }}
          DISCORD_VOTING_ALERTS_WEBHOOK_URL: ${{ secrets.DISCORD_VOTING_ALERTS_WEBHOOK_URL }}
        run: node automation/voting/run-scheduler.mjs

      - name: Upload winner handoff
        # Only runs when the scheduler wrote a handoff into automation-output/.
        # if-no-files-found: ignore keeps a no-op run (most hours) green.
        if: always() && steps.copenhagen_gate.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: winner-handoff
          path: automation-output/*.md
          if-no-files-found: ignore
          retention-days: 30
