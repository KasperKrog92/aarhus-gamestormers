name: Update store sale data

on:
  workflow_dispatch:
  schedule:
    - cron: "23 5 * * *"
  push:
    paths:
      - "index.html"
      - "en/index.html"
      - ".github/workflows/update-steam-sales.yml"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Fetch current store discounts
        uses: actions/github-script@v8
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
        with:
          script: |
            const fs = require('fs/promises');
            const path = require('path');

            const steamAppIds = new Set();
            const gogProductIds = new Set();
            // id -> { title, date, url }, used to build readable Discord notifications.
            const steamMeta = {};
            const gogMeta = {};

            // Preferred source: the D1-backed public meetings API. The homepage
            // event/history cards are rendered from the same data, so the sale
            // badges read whatever store links the API exposes for upcoming
            // meetings. We fall back to parsing the static HTML cards when the
            // API has no upcoming meetings yet (e.g. before the D1 backfill).
            const siteBaseUrl = (process.env.SITE_BASE_URL || 'https://www.gamestormers.dk').replace(/\/+$/, '');

            function formatMeetingDate(isoDate) {
              const match = /^(\d{4})-(\d{2})-(\d{2})$/.exec(String(isoDate || ''));
              if (!match) return '';
              const date = new Date(Date.UTC(Number(match[1]), Number(match[2]) - 1, Number(match[3])));
              return new Intl.DateTimeFormat('en-GB', {
                timeZone: 'UTC',
                day: 'numeric',
                month: 'long',
                year: 'numeric',
              }).format(date);
            }

            async function collectFromApi() {
              const endpoint = `${siteBaseUrl}/api/meetings/public`;
              let payload;
              try {
                const response = await fetch(endpoint, { headers: { accept: 'application/json' } });
                if (!response.ok) throw new Error(`status ${response.status}`);
                payload = await response.json();
              } catch (error) {
                core.warning(`Could not read meetings from ${endpoint}: ${error.message}`);
                return 0;
              }
              const upcoming = (payload && payload.meetings && payload.meetings.upcoming) || [];
              let count = 0;
              for (const meeting of upcoming) {
                const game = meeting && meeting.game;
                if (!game) continue;
                const title = String(game.title || '').trim();
                const date = formatMeetingDate(meeting.meetingDate);

                const steamId = String(game.steamAppId || '').trim();
                if (/^\d+$/.test(steamId)) {
                  steamAppIds.add(steamId);
                  steamMeta[steamId] = {
                    title,
                    date,
                    url: game.storeUrl || `https://store.steampowered.com/app/${steamId}/`,
                  };
                  count += 1;
                }

                const gogId = String(game.gogId || '').trim();
                if (/^\d+$/.test(gogId)) {
                  gogProductIds.add(gogId);
                  gogMeta[gogId] = { title, date, url: game.gogUrl || '' };
                  count += 1;
                }
              }
              return count;
            }

            async function collectFromHtml() {
              const htmlFiles = ['index.html', 'en/index.html'];
              const eventStoreLinksPattern = /<div class="event-store-links">([\s\S]*?)<\/div>/g;
              const steamLinkPattern = /store\.steampowered\.com\/app\/(\d+)/g;
              const steamHrefPattern = /href="(https:\/\/store\.steampowered\.com\/app\/(\d+)[^"]*)"/;
              const gogIdPattern = /data-gog-id=["'](\d+)["']/g;
              const gogAnchorPattern = /href="(https:\/\/www\.gog\.com\/[^"]*)"[^>]*data-gog-id=["'](\d+)["']/;
              const titleAfterPattern = /<h3 class="event-title">([\s\S]*?)<\/h3>/;
              const eventDatePattern = /<span class="event-detail-label">(?:Dato|Date)<\/span>\s*<span class="event-detail-value">([\s\S]*?)<\/span>/;

              for (const file of htmlFiles) {
                const html = await fs.readFile(file, 'utf8');
                for (const blockMatch of html.matchAll(eventStoreLinksPattern)) {
                  const block = blockMatch[1];
                  // The game title sits in the <h3> right after the store-links block.
                  const after = html.slice(blockMatch.index + blockMatch[0].length);
                  const titleMatch = after.match(titleAfterPattern);
                  const title = titleMatch ? titleMatch[1].replace(/\s+/g, ' ').trim() : '';
                  // The meeting date is the first event-detail value after the block.
                  // en/index.html is scanned last, so the English date wins.
                  const dateMatch = after.match(eventDatePattern);
                  const date = dateMatch ? dateMatch[1].replace(/\s+/g, ' ').trim() : '';

                  for (const match of block.matchAll(steamLinkPattern)) {
                    steamAppIds.add(match[1]);
                  }
                  const steamHref = block.match(steamHrefPattern);
                  if (steamHref) {
                    steamMeta[steamHref[2]] = { title, date, url: steamHref[1] };
                  }

                  for (const match of block.matchAll(gogIdPattern)) {
                    gogProductIds.add(match[1]);
                  }
                  const gogAnchor = block.match(gogAnchorPattern);
                  if (gogAnchor) {
                    gogMeta[gogAnchor[2]] = { title, date, url: gogAnchor[1] };
                  }
                }
              }
            }

            const apiCount = await collectFromApi();
            if (apiCount > 0) {
              core.info(`Read ${apiCount} store link(s) from ${siteBaseUrl}/api/meetings/public.`);
            } else {
              core.info('No upcoming meetings from the API; parsing static HTML cards instead.');
              await collectFromHtml();
            }

            function sortNumericIds(ids) {
              return [...ids].sort((a, b) => Number(a) - Number(b));
            }

            async function writeJson(file, data) {
              await fs.mkdir(path.dirname(file), { recursive: true });
              await fs.writeFile(file, JSON.stringify(data, null, 2) + '\n');
            }

            async function readJson(file) {
              try {
                return JSON.parse(await fs.readFile(file, 'utf8'));
              } catch {
                return null;
              }
            }

            function minorUnitsToNumber(value) {
              const match = String(value || '').match(/(\d+)/);
              return match ? Number(match[1]) : 0;
            }

            function formatGogPrice(value, currency) {
              const amount = minorUnitsToNumber(value);
              if (!amount || !currency) return '';
              return `${(amount / 100).toFixed(2)} ${currency}`;
            }

            async function fetchSteamSales(ids) {
              const apps = {};

              if (ids.length) {
                const endpoint = new URL('https://store.steampowered.com/api/appdetails');
                endpoint.searchParams.set('appids', ids.join(','));
                endpoint.searchParams.set('filters', 'price_overview');
                endpoint.searchParams.set('cc', 'dk');
                endpoint.searchParams.set('l', 'english');

                const response = await fetch(endpoint);
                if (!response.ok) {
                  throw new Error(`Steam returned ${response.status}`);
                }

                const payload = await response.json();
                for (const appId of ids) {
                  const overview = payload?.[appId]?.data?.price_overview;
                  const discountPercent = Number(overview?.discount_percent || 0);

                  apps[appId] = {
                    onSale: discountPercent > 0,
                    discountPercent,
                    initialFormatted: overview?.initial_formatted || '',
                    finalFormatted: overview?.final_formatted || '',
                    currency: overview?.currency || ''
                  };
                }
              }

              return apps;
            }

            // Steam's classic appdetails endpoint (used above) does not expose when
            // a discount ends. The newer store browse API does, under
            // best_purchase_option.active_discounts[].discount_end_date (Unix
            // seconds). We fetch it separately so the proven price logic above
            // stays untouched, and degrade gracefully (no end dates) if it fails.
            async function fetchSteamDiscountEndDates(ids) {
              const endDates = {};
              if (!ids.length) return endDates;

              try {
                const input = {
                  ids: ids.map((id) => ({ appid: Number(id) })),
                  context: { language: 'english', country_code: 'DK' },
                  data_request: { include_assets: false }
                };
                const endpoint = new URL('https://api.steampowered.com/IStoreBrowseService/GetItems/v1/');
                endpoint.searchParams.set('input_json', JSON.stringify(input));

                const response = await fetch(endpoint);
                if (!response.ok) {
                  throw new Error(`Steam GetItems returned ${response.status}`);
                }

                const payload = await response.json();
                const items = payload?.response?.store_items || [];
                for (const item of items) {
                  const appId = String(item?.appid ?? item?.id ?? '');
                  const endTs = Number(item?.best_purchase_option?.active_discounts?.[0]?.discount_end_date || 0);
                  if (appId && endTs > 0) {
                    endDates[appId] = new Date(endTs * 1000).toISOString();
                  }
                }
              } catch (error) {
                core.warning(`Could not read Steam discount end dates: ${error.message}`);
              }

              return endDates;
            }

            async function fetchGogSales(ids) {
              const products = {};

              for (const productId of ids) {
                try {
                  const endpoint = new URL(`https://api.gog.com/products/${productId}/prices`);
                  endpoint.searchParams.set('countryCode', 'DK');

                  const response = await fetch(endpoint);
                  if (!response.ok) {
                    throw new Error(`GOG returned ${response.status}`);
                  }

                  const payload = await response.json();
                  const prices = payload?._embedded?.prices || [];
                  const price = prices.find(item => item?.currency?.code === 'DKK') || prices[0] || {};
                  const currency = price?.currency?.code || '';
                  const base = minorUnitsToNumber(price.basePrice);
                  const final = minorUnitsToNumber(price.finalPrice);
                  const discountPercent = base > final && final > 0 ? Math.round((1 - final / base) * 100) : 0;

                  products[productId] = {
                    onSale: discountPercent > 0,
                    discountPercent,
                    initialFormatted: discountPercent > 0 ? formatGogPrice(price.basePrice, currency) : '',
                    finalFormatted: discountPercent > 0 ? formatGogPrice(price.finalPrice, currency) : '',
                    currency
                  };
                } catch (error) {
                  core.warning(`Could not update GOG product ${productId}: ${error.message}`);
                  products[productId] = {
                    onSale: false,
                    discountPercent: 0,
                    initialFormatted: '',
                    finalFormatted: '',
                    currency: ''
                  };
                }
              }

              return products;
            }

            const steamIds = sortNumericIds(steamAppIds);
            const gogIds = sortNumericIds(gogProductIds);

            const steamFile = path.join('data', 'steam-sales.json');
            const gogFile = path.join('data', 'gog-sales.json');

            // Read the prior run's data before overwriting, so we can detect
            // games that newly went on sale (off -> on transitions).
            const previousSteam = await readJson(steamFile);
            const previousGog = await readJson(gogFile);

            const steamApps = await fetchSteamSales(steamIds);
            const steamDiscountEndDates = await fetchSteamDiscountEndDates(steamIds);
            for (const [appId, info] of Object.entries(steamApps)) {
              const prev = previousSteam?.apps?.[appId];
              info.discountEndsAt = info.onSale ? (steamDiscountEndDates[appId] || null) : null;
              // Carry the "ending soon" reminder flag across daily runs while the
              // same discount is running, so we remind at most once. Reset it when
              // the game is off sale or Steam moved the end date (a new discount).
              const sameDiscount = info.onSale && prev?.onSale && prev.discountEndsAt === info.discountEndsAt;
              info.endingSoonNotified = sameDiscount ? Boolean(prev.endingSoonNotified) : false;
            }

            const steamData = {
              updatedAt: new Date().toISOString(),
              country: 'DK',
              apps: steamApps
            };
            const gogData = {
              updatedAt: new Date().toISOString(),
              country: 'DK',
              products: await fetchGogSales(gogIds)
            };

            // Announce sale changes to Discord: games that newly went on sale, and
            // a reminder the day before a Steam discount ends. Stays silent while a
            // sale simply continues, so it never spams.
            const webhookUrl = process.env.DISCORD_WEBHOOK_URL;
            if (webhookUrl) {
              const announcements = [];

              // Steam prices Denmark in EUR, so we append an approximate DKK.
              // DKK is pegged to the euro, so a fixed rate stays accurate to
              // within a fraction of a percent. GOG already reports DKK.
              const EUR_TO_DKK = 7.46;
              function eurToDkk(formatted) {
                const cleaned = String(formatted || '').replace(/[^\d.,]/g, '');
                if (!cleaned) return '';
                const eur = Number(cleaned.replace(/\./g, '').replace(',', '.'));
                if (!Number.isFinite(eur) || eur <= 0) return '';
                return `${Math.round(eur * EUR_TO_DKK)} kr.`;
              }

              function formatPrice(info, convertToDkk) {
                let price = info.initialFormatted
                  ? `~~${info.initialFormatted}~~ **${info.finalFormatted}**`
                  : `**${info.finalFormatted}**`;
                if (convertToDkk) {
                  const dkk = eurToDkk(info.finalFormatted);
                  if (dkk) price += ` (≈${dkk})`;
                }
                return price;
              }

              function meetingLineFor(game) {
                return game.date
                  ? `Our game for the meeting on ${game.date}.`
                  : 'Our next club game.';
              }

              // Angle brackets keep the store link clickable but stop Discord from
              // unfurling the bulky store-page preview embed.
              function linkLineFor(game) {
                return game.url ? `\n<${game.url}>` : '';
              }

              // Discord renders <t:UNIX:R>/<t:UNIX:F> in each reader's own locale
              // and timezone, so we hand it the raw timestamp instead of a fixed
              // string. Returns { relative, full } tags, or null when unknown.
              function saleEndTags(info) {
                if (!info.discountEndsAt) return null;
                const unix = Math.floor(Date.parse(info.discountEndsAt) / 1000);
                if (!Number.isFinite(unix) || unix <= 0) return null;
                return { relative: `<t:${unix}:R>`, full: `<t:${unix}:F>` };
              }

              // (a) Games that newly went on sale (off -> on since the last run).
              function collectNewSales(currentMap, previousMap, meta, convertToDkk) {
                for (const [id, info] of Object.entries(currentMap || {})) {
                  if (!info.onSale) continue;
                  if (previousMap && previousMap[id] && previousMap[id].onSale) continue;

                  const game = meta[id] || {};
                  const title = game.title || id;
                  const price = formatPrice(info, convertToDkk);
                  const ends = saleEndTags(info);
                  const endLine = ends ? `\nSale ends ${ends.relative} (${ends.full}).` : '';
                  const linkLine = linkLineFor(game);
                  announcements.push(`🔥 **${title}** is now ${info.discountPercent}% off!\n${meetingLineFor(game)}\nPrice: ${price}${endLine}${linkLine}`);
                }
              }

              // (b) Steam discounts ending within the next SALE_ENDING_SOON_HOURS.
              // The cron runs every 24h, so a ~30h window reliably catches the final
              // day before a sale ends, and the endingSoonNotified flag keeps it to
              // one reminder. Sales that only started this run are left to their own
              // announcement above; only Steam exposes discount end dates.
              const SALE_ENDING_SOON_HOURS = 30;
              function collectEndingSoon(currentMap, previousMap, meta, convertToDkk) {
                const now = Date.now();
                for (const [id, info] of Object.entries(currentMap || {})) {
                  if (!info.onSale || info.endingSoonNotified) continue;
                  if (!(previousMap && previousMap[id] && previousMap[id].onSale)) continue;
                  const ends = saleEndTags(info);
                  if (!ends) continue;
                  const hoursLeft = (Date.parse(info.discountEndsAt) - now) / 3600000;
                  if (hoursLeft <= 0 || hoursLeft > SALE_ENDING_SOON_HOURS) continue;

                  const game = meta[id] || {};
                  const title = game.title || id;
                  const price = formatPrice(info, convertToDkk);
                  const linkLine = linkLineFor(game);
                  announcements.push(`⏰ **${title}** is still ${info.discountPercent}% off, but the sale ends ${ends.relative} (${ends.full}).\n${meetingLineFor(game)}\nPrice: ${price}${linkLine}`);
                  info.endingSoonNotified = true;
                }
              }

              collectNewSales(steamData.apps, previousSteam && previousSteam.apps, steamMeta, true);
              collectNewSales(gogData.products, previousGog && previousGog.products, gogMeta, false);
              collectEndingSoon(steamData.apps, previousSteam && previousSteam.apps, steamMeta, true);

              if (announcements.length) {
                const res = await fetch(webhookUrl, {
                  method: 'POST',
                  headers: { 'content-type': 'application/json' },
                  body: JSON.stringify({
                    content: announcements.join('\n\n'),
                    allowed_mentions: { parse: [] }
                  })
                });
                if (!res.ok) {
                  core.warning(`Discord webhook returned ${res.status}`);
                } else {
                  core.info(`Posted ${announcements.length} sale notification(s) to Discord.`);
                }
              } else {
                core.info('No sale changes to announce.');
              }
            } else {
              core.info('DISCORD_WEBHOOK_URL not set; skipping Discord notification.');
            }

            // Write after the Discord step so the endingSoonNotified flags set by
            // the reminder pass are persisted for the next run.
            await writeJson(steamFile, steamData);
            await writeJson(gogFile, gogData);

            const diffExitCode = await exec.exec('git', ['diff', '--quiet', '--', 'data/steam-sales.json', 'data/gog-sales.json'], {
              ignoreReturnCode: true
            });

            if (diffExitCode === 0) {
              core.info('Store sale data is already current.');
              return;
            }

            await exec.exec('git', ['config', 'user.name', 'github-actions[bot]']);
            await exec.exec('git', ['config', 'user.email', '41898282+github-actions[bot]@users.noreply.github.com']);
            await exec.exec('git', ['add', 'data/steam-sales.json', 'data/gog-sales.json']);
            await exec.exec('git', ['commit', '-m', 'Update store sale data']);
            await exec.exec('git', ['push']);
