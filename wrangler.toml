# Cloudflare Pages + Functions config for Aarhus Gamestormers.
#
# The static site is the repo root; Pages Functions live in /functions and run
# same-origin under /api/*. Local dev:
#
#   wrangler d1 create gamestormers          # once; paste the id below
#   wrangler d1 execute gamestormers --local --file=./schema.sql
#   wrangler pages dev                        # serves site + functions + local D1
#
# Secrets for local dev go in .dev.vars (gitignored), NOT here:
#   ADMIN_TOKEN="choose-a-long-random-string"
#   DISCORD_CLIENT_ID="Discord OAuth2 client ID"
#   DISCORD_CLIENT_SECRET="Discord OAuth2 client secret"
#   DISCORD_REDIRECT_URI="http://127.0.0.1:8788/api/auth/discord/callback"
#   SESSION_SECRET="long-random-session-secret"
#
# In production, non-secret runtime vars live in [vars] below. Set
# ADMIN_TOKEN, DISCORD_CLIENT_ID, DISCORD_CLIENT_SECRET, SESSION_SECRET, and
# optional webhook URLs as encrypted secrets in the Cloudflare Pages settings.
# Bind the D1 database (binding name DB) in the Cloudflare Pages project settings.

# The git-connected Pages build must produce the allowlisted artifact, never
# serve the repo root: git builds ignore .assetsignore, so a root output dir
# publishes every tracked file (schema, docs, tests, automation source) as a
# public asset. The Pages dashboard build command must be set to
# "npm run prepare:deploy-pages" so this output directory exists at deploy time.
name = "aarhus-gamestormers-site"
compatibility_date = "2026-06-23"
pages_build_output_dir = ".deploy/pages"

[vars]
DISCORD_GUILD_ID = "1333453198408683613"
DISCORD_REDIRECT_URI = "https://www.gamestormers.dk/api/auth/discord/callback"

[[d1_databases]]
binding = "DB"
database_name = "gamestormers"
database_id = "8616a74f-99ee-450e-bd0b-1f91feb08bfb"
