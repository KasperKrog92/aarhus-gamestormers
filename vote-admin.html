<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Vote admin – Aarhus Gamestormers</title>
  <link rel="icon" type="image/png" href="/favicon/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css?v=12">
  <meta name="theme-color" content="#2B2436">
</head>

<body>

<header class="gs-header">
  <div class="wrap">
    <a href="/" aria-label="Aarhus Gamestormers">
      <img src="/img/logo.webp" alt="Aarhus Gamestormers logo" class="gs-logo" width="160" height="85">
    </a>
    <nav class="gs-nav" aria-label="Admin">
      <span class="nav-text" style="color:rgba(247,244,238,0.75)">Vote admin</span>
    </nav>
  </div>
</header>

<main class="gs-admin">
  <div class="wrap">
    <h1 class="section-title">Vote admin</h1>

    <!-- Token gate -->
    <div class="admin-card" id="auth-card">
      <h2>Connect</h2>
      <p class="admin-meta">Enter the admin token (the <code>ADMIN_TOKEN</code> secret). It is kept only in this tab's sessionStorage and sent as a Bearer header over HTTPS.</p>
      <div class="admin-actions">
        <input class="admin-input" id="token" type="password" placeholder="Admin token" autocomplete="off" style="max-width:340px">
        <button class="admin-btn primary" id="connect">Connect</button>
      </div>
      <div class="admin-msg err" id="auth-msg" hidden></div>
    </div>

    <div id="admin-body" hidden>
      <div class="admin-picker-row">
        <select class="admin-select" id="round-select"></select>
        <button class="admin-btn primary" id="btn-new-round" type="button" aria-expanded="false" aria-controls="new-round-panel">+ New round</button>
      </div>

      <div class="admin-card admin-new-round" id="new-round-panel" hidden>
        <div class="admin-new-round-head">
          <h2>Open a new round</h2>
          <button class="admin-btn ghost" id="nr-cancel" type="button">Cancel</button>
        </div>
        <p class="admin-meta">Creates the next round and makes it the current one (phase: suggesting).</p>
        <div class="admin-grid">
          <div>
            <label class="admin-field-label" for="nr-id">Meeting number</label>
            <input class="admin-input" id="nr-id" type="number" min="1" placeholder="19">
          </div>
          <div>
            <label class="admin-field-label" for="nr-code">Storm code</label>
            <input class="admin-input" id="nr-code" type="text" placeholder="storm19">
          </div>
          <div>
            <label class="admin-field-label" for="nr-title">Title (optional)</label>
            <input class="admin-input" id="nr-title" type="text" placeholder="Meeting 19">
          </div>
          <div>
            <label class="admin-field-label" for="nr-meeting-date">Meeting date</label>
            <input class="admin-input" id="nr-meeting-date" type="date">
          </div>
          <div>
            <label class="admin-field-label" for="nr-suggestions-months">Suggestions start months before</label>
            <input class="admin-input" id="nr-suggestions-months" type="number" min="0" max="24" step="0.1" value="2.5">
          </div>
          <div>
            <label class="admin-field-label" for="nr-voting-months">Voting closes months before</label>
            <input class="admin-input" id="nr-voting-months" type="number" min="0" max="24" step="0.1" value="2">
          </div>
          <div>
            <label class="admin-field-label" for="nr-suggestions-open">Suggestions open</label>
            <input class="admin-input" id="nr-suggestions-open" type="date">
          </div>
          <div>
            <label class="admin-field-label" for="nr-closes">Voting closes</label>
            <input class="admin-input" id="nr-closes" type="date">
          </div>
        </div>
        <div class="admin-actions">
          <button class="admin-btn primary" id="open-round">Open round</button>
        </div>
        <div class="admin-msg" id="new-round-msg" hidden></div>
      </div>

      <details class="admin-section" open>
        <summary class="admin-section-summary">Round</summary>
        <div id="round-area"></div>
      </details>

      <details class="admin-section">
        <summary class="admin-section-summary">Suggestions</summary>
        <div id="suggestions"></div>
      </details>

      <details class="admin-section">
        <summary class="admin-section-summary">Votes</summary>
        <div id="ballots"></div>
      </details>
    </div>
  </div>
</main>

<script>
(function () {
  var API = '/api/admin';
  var TOKEN_KEY = 'gs-admin-token';
  var token = sessionStorage.getItem(TOKEN_KEY) || '';
  var currentRoundId = null;

  var $ = function (id) { return document.getElementById(id); };
  var PHASES = ['suggesting', 'voting', 'revealed', 'closed'];
  var DAY_MS = 24 * 60 * 60 * 1000;

  function parseDateOnly(value) {
    var match = String(value || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (!match) return null;
    var date = new Date(Date.UTC(Number(match[1]), Number(match[2]) - 1, Number(match[3])));
    if (date.getUTCFullYear() !== Number(match[1]) || date.getUTCMonth() !== Number(match[2]) - 1 || date.getUTCDate() !== Number(match[3])) return null;
    return date;
  }

  function dateOnly(date) {
    return date.toISOString().slice(0, 10);
  }

  function addMonthsClamped(date, deltaMonths) {
    var sourceYear = date.getUTCFullYear();
    var sourceMonth = date.getUTCMonth();
    var sourceDay = date.getUTCDate();
    var targetMonthIndex = sourceYear * 12 + sourceMonth + deltaMonths;
    var targetYear = Math.floor(targetMonthIndex / 12);
    var targetMonth = targetMonthIndex - targetYear * 12;
    var lastDay = new Date(Date.UTC(targetYear, targetMonth + 1, 0)).getUTCDate();
    return new Date(Date.UTC(targetYear, targetMonth, Math.min(sourceDay, lastDay)));
  }

  function cleanMonthsBefore(value, fallback) {
    var number = Number(value);
    if (!Number.isFinite(number) || number < 0 || number > 24) return fallback;
    return Math.round(number * 10) / 10;
  }

  function dateBeforeMeeting(meeting, monthsBefore) {
    var wholeMonths = Math.trunc(monthsBefore);
    var days = Math.round((monthsBefore - wholeMonths) * 30);
    return dateOnly(new Date(addMonthsClamped(meeting, -wholeMonths).getTime() - days * DAY_MS));
  }

  function defaultScheduleForMeetingDate(meetingDate, suggestionsMonths, votingMonths) {
    var meeting = parseDateOnly(meetingDate);
    if (!meeting) return { suggestionsOpenAt: '', votingClosesAt: '' };
    suggestionsMonths = cleanMonthsBefore(suggestionsMonths, 2.5);
    votingMonths = cleanMonthsBefore(votingMonths, 2);
    return {
      suggestionsOpenAt: dateBeforeMeeting(meeting, suggestionsMonths),
      votingClosesAt: dateBeforeMeeting(meeting, votingMonths),
    };
  }

  function h(tag, attrs, kids) {
    var n = document.createElement(tag);
    if (attrs) Object.keys(attrs).forEach(function (k) {
      if (k === 'class') n.className = attrs[k];
      else if (k === 'text') n.textContent = attrs[k];
      else if (k.slice(0, 2) === 'on' && typeof attrs[k] === 'function') n.addEventListener(k.slice(2), attrs[k]);
      else if (attrs[k] != null) n.setAttribute(k, attrs[k]);
    });
    (kids || []).forEach(function (c) {
      if (c == null) return;
      n.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
    });
    return n;
  }

  function authedFetch(path, opts) {
    opts = opts || {};
    opts.headers = Object.assign({ Authorization: 'Bearer ' + token }, opts.headers || {});
    if (opts.body) opts.headers['content-type'] = 'application/json';
    return fetch(API + path, opts).then(function (res) {
      return res.json().then(function (data) {
        if (!res.ok) throw new Error(data && data.error ? data.error : 'HTTP ' + res.status);
        return data;
      });
    });
  }

  function showMsg(node, text, ok) {
    node.className = 'admin-msg ' + (ok ? 'ok' : 'err');
    node.textContent = text;
    node.hidden = false;
  }

  function connect() {
    token = $('token').value.trim();
    if (!token) return;
    sessionStorage.setItem(TOKEN_KEY, token);
    load();
  }

  function renderRoundPicker(rounds, selectedId) {
    var sel = $('round-select');
    sel.innerHTML = '';
    if (!rounds.length) {
      var opt = document.createElement('option');
      opt.disabled = true;
      opt.textContent = 'No rounds yet — open one below';
      sel.appendChild(opt);
      return;
    }
    rounds.forEach(function (r) {
      var opt = document.createElement('option');
      opt.value = r.id;
      var label = 'Round #' + r.id;
      if (r.title) label += ' — ' + r.title;
      if (r.meeting_date) label += ' · ' + r.meeting_date;
      label += ' (' + r.phase + ')';
      opt.textContent = label;
      if (r.id === selectedId) opt.selected = true;
      sel.appendChild(opt);
    });
  }

  function prefillNewRound(rounds) {
    var nextId = rounds.length
      ? Math.max.apply(null, rounds.map(function (r) { return r.id; })) + 1
      : 1;
    $('nr-id').value = nextId;
    $('nr-code').value = 'storm' + nextId;
    $('nr-title').value = 'Meeting ' + nextId;
    $('nr-meeting-date').value = '';
    $('nr-suggestions-months').value = '2.5';
    $('nr-voting-months').value = '2';
    $('nr-suggestions-open').value = '';
    $('nr-closes').value = '';
  }

  function applyData(data) {
    currentRoundId = data.round ? data.round.id : null;
    renderRound(data.round, data.tallies || {});
    renderSuggestions(data.suggestions || [], data.tallies || {});
    renderBallots(data.ballots || [], data.suggestions || []);
  }

  function loadRound(id) {
    authedFetch('/round/' + id)
      .then(applyData)
      .catch(function (err) { alert(err.message); });
  }

  function load() {
    var roundFetch = currentRoundId ? authedFetch('/round/' + currentRoundId) : authedFetch('/round');
    Promise.all([authedFetch('/rounds'), roundFetch])
      .then(function (results) {
        var roundList = results[0].rounds || [];
        var data = results[1];
        $('auth-msg').hidden = true;
        $('admin-body').hidden = false;
        $('auth-card').hidden = true;
        if (!currentRoundId && data.round) currentRoundId = data.round.id;
        renderRoundPicker(roundList, currentRoundId);
        prefillNewRound(roundList);
        applyData(data);
      })
      .catch(function (err) {
        $('admin-body').hidden = true;
        $('auth-card').hidden = false;
        showMsg($('auth-msg'), err.message, false);
      });
  }

  // ── current round ──────────────────────────────────────────────────────────
  function renderRound(round, tallies) {
    var area = $('round-area');
    area.innerHTML = '';
    if (!round) {
      area.appendChild(h('div', { class: 'admin-card' }, [
        h('h2', { text: 'No rounds yet' }),
        h('p', { class: 'admin-meta', text: 'Use the + New round button above to start a cycle.' }),
      ]));
      return;
    }

    var titleInput = h('input', { class: 'admin-input', type: 'text', value: round.title || '' });
    var codeInput = h('input', { class: 'admin-input', type: 'text', value: round.storm_code || '' });
    var meetingDateInput = h('input', { class: 'admin-input', type: 'date', value: round.meeting_date || '' });
    var suggestionsMonthsInput = h('input', {
      class: 'admin-input',
      type: 'number',
      min: '0',
      max: '24',
      step: '0.1',
      value: round.suggestions_open_months_before != null ? round.suggestions_open_months_before : 2.5,
    });
    var votingMonthsInput = h('input', {
      class: 'admin-input',
      type: 'number',
      min: '0',
      max: '24',
      step: '0.1',
      value: round.voting_closes_months_before != null ? round.voting_closes_months_before : 2,
    });
    var suggestionsOpenInput = h('input', { class: 'admin-input', type: 'date', value: round.suggestions_open_at || '' });
    var closesInput = h('input', { class: 'admin-input', type: 'date', value: round.voting_closes_at || '' });

    function updateRoundScheduleDefaults() {
      var schedule = defaultScheduleForMeetingDate(meetingDateInput.value, suggestionsMonthsInput.value, votingMonthsInput.value);
      suggestionsOpenInput.value = schedule.suggestionsOpenAt;
      closesInput.value = schedule.votingClosesAt;
    }
    meetingDateInput.addEventListener('change', updateRoundScheduleDefaults);
    suggestionsMonthsInput.addEventListener('change', updateRoundScheduleDefaults);
    votingMonthsInput.addEventListener('change', updateRoundScheduleDefaults);

    var phaseSelect = h('select', { class: 'admin-select' }, PHASES.map(function (p) {
      return h('option', { value: p, text: p, selected: p === round.phase ? 'selected' : null });
    }));

    var msg = h('div', { class: 'admin-msg', hidden: 'hidden' });

    var saveBtn = h('button', { class: 'admin-btn primary', onclick: function () {
      authedFetch('/round/' + round.id, {
        method: 'PATCH',
        body: JSON.stringify({
          title: titleInput.value,
          stormCode: codeInput.value,
          phase: phaseSelect.value,
          meetingDate: meetingDateInput.value,
          suggestionsOpenMonthsBefore: suggestionsMonthsInput.value,
          votingClosesMonthsBefore: votingMonthsInput.value,
          suggestionsOpenAt: suggestionsOpenInput.value,
          votingClosesAt: closesInput.value,
        }),
      }).then(function () { showMsg(msg, 'Saved.', true); load(); })
        .catch(function (e) { showMsg(msg, e.message, false); });
    } }, ['Save']);

    var deleteBtn = h('button', { class: 'admin-btn danger', onclick: function () {
      if (!confirm('Delete round #' + round.id + ' and ALL its suggestions and votes? This cannot be undone.')) return;
      authedFetch('/round/' + round.id, { method: 'DELETE' })
        .then(function () { currentRoundId = null; load(); })
        .catch(function (e) { showMsg(msg, e.message, false); });
    } }, ['Delete round']);

    area.appendChild(h('div', { class: 'admin-card' }, [
      h('h2', { text: 'Round #' + round.id + (round.title ? ' — ' + round.title : '') }),
      h('p', { class: 'admin-meta', html: 'Public URL: <a href="/vote" target="_blank" rel="noopener">/vote</a> · phase controls what visitors see (suggesting → voting → revealed).' }),
      h('div', { class: 'admin-grid' }, [
        h('div', null, [h('label', { class: 'admin-field-label', text: 'Title' }), titleInput]),
        h('div', null, [h('label', { class: 'admin-field-label', text: 'Storm code' }), codeInput]),
        h('div', null, [h('label', { class: 'admin-field-label', text: 'Phase' }), phaseSelect]),
        h('div', null, [h('label', { class: 'admin-field-label', text: 'Meeting date' }), meetingDateInput]),
        h('div', null, [h('label', { class: 'admin-field-label', text: 'Suggestions start months before' }), suggestionsMonthsInput]),
        h('div', null, [h('label', { class: 'admin-field-label', text: 'Voting closes months before' }), votingMonthsInput]),
        h('div', null, [h('label', { class: 'admin-field-label', text: 'Suggestions open' }), suggestionsOpenInput]),
        h('div', null, [h('label', { class: 'admin-field-label', text: 'Voting closes' }), closesInput]),
      ]),
      h('div', { class: 'admin-actions' }, [saveBtn, deleteBtn]),
      msg,
    ]));
  }

  // ── suggestions ──────────────────────────────────────────────────────────
  function renderSuggestions(suggestions, tallies) {
    var wrap = $('suggestions');
    wrap.innerHTML = '';
    if (!suggestions.length) {
      wrap.appendChild(h('div', { class: 'admin-card' }, [h('p', { class: 'admin-meta', text: 'No suggestions yet.' })]));
      return;
    }
    // pending first, then approved, then rejected
    var order = { pending: 0, approved: 1, rejected: 2 };
    suggestions.slice().sort(function (a, b) {
      return (order[a.status] - order[b.status]) || (a.id - b.id);
    }).forEach(function (s) {
      wrap.appendChild(suggestionCard(s, tallies[s.id] || 0));
    });
  }

  function field(label, control) {
    return h('div', null, [h('label', { class: 'admin-field-label', text: label }), control]);
  }

  function suggestionCard(s, votes) {
    var msg = h('div', { class: 'admin-msg', hidden: 'hidden' });

    var inputs = {
      title: h('input', { class: 'admin-input', type: 'text', value: s.title || '' }),
      image: h('input', { class: 'admin-input', type: 'url', value: s.header_image || '' }),
      storeUrl: h('input', { class: 'admin-input', type: 'url', value: s.store_url || '' }),
      genres: h('input', { class: 'admin-input', type: 'text', value: s.genres || '' }),
      price: h('input', { class: 'admin-input', type: 'text', value: s.price || '' }),
      platforms: h('input', { class: 'admin-input', type: 'text', value: s.platforms || '' }),
      playtimeHours: h('input', { class: 'admin-input', type: 'number', min: '0', value: s.playtime_hours != null ? s.playtime_hours : '' }),
      gogUrl: h('input', { class: 'admin-input', type: 'url', value: s.gog_url || '' }),
      suggestedBy: h('input', { class: 'admin-input', type: 'text', value: s.suggested_by || '' }),
      descriptionDa: h('textarea', { class: 'admin-textarea' }),
      descriptionEn: h('textarea', { class: 'admin-textarea' }),
      pitch: h('textarea', { class: 'admin-textarea' }),
    };
    inputs.descriptionDa.value = s.description_da || '';
    inputs.descriptionEn.value = s.description_en || '';
    inputs.pitch.value = s.pitch || '';

    function patch(body, okText) {
      authedFetch('/suggestion/' + s.id, { method: 'PATCH', body: JSON.stringify(body) })
        .then(function () { showMsg(msg, okText || 'Saved.', true); load(); })
        .catch(function (e) { showMsg(msg, e.message, false); });
    }

    var actions = h('div', { class: 'admin-actions' }, [
      h('button', { class: 'admin-btn primary', onclick: function () {
        patch({
          title: inputs.title.value,
          image: inputs.image.value,
          storeUrl: inputs.storeUrl.value,
          genres: inputs.genres.value,
          price: inputs.price.value,
          platforms: inputs.platforms.value,
          playtimeHours: inputs.playtimeHours.value,
          gogUrl: inputs.gogUrl.value,
          suggestedBy: inputs.suggestedBy.value,
          descriptionDa: inputs.descriptionDa.value,
          descriptionEn: inputs.descriptionEn.value,
          pitch: inputs.pitch.value,
        });
      } }, ['Save']),
      s.status !== 'approved' ? h('button', { class: 'admin-btn primary', onclick: function () { patch({ status: 'approved' }, 'Approved.'); } }, ['Approve']) : null,
      s.status !== 'rejected' ? h('button', { class: 'admin-btn ghost', onclick: function () { patch({ status: 'rejected' }, 'Rejected.'); } }, ['Reject']) : null,
      h('button', { class: 'admin-btn danger', onclick: function () {
        if (!confirm('Delete this suggestion permanently?')) return;
        authedFetch('/suggestion/' + s.id, { method: 'DELETE' })
          .then(function () { load(); })
          .catch(function (e) { showMsg(msg, e.message, false); });
      } }, ['Delete']),
    ]);

    var header = h('div', { class: 'admin-actions', style: 'justify-content:space-between;margin-bottom:10px' }, [
      h('span', null, [
        h('span', { class: 'admin-badge ' + s.status, text: s.status }),
        s.steam_appid ? null : h('span', { class: 'admin-badge nonsteam', style: 'margin-left:6px', text: 'non-Steam' }),
      ]),
      h('span', { class: 'admin-meta', style: 'margin:0', html: '#' + s.id + ' · <span class="admin-votes">' + votes + ' votes</span>' }),
    ]);

    var fields = h('div', { class: 'admin-grid' }, [
      field('Title', inputs.title),
      field('Image URL', inputs.image),
      field('Store URL', inputs.storeUrl),
      field('Genres (comma-separated)', inputs.genres),
      field('Price', inputs.price),
      field('Platforms', inputs.platforms),
      field('Playtime (hours)', inputs.playtimeHours),
      field('GOG URL', inputs.gogUrl),
      field('Suggested by', inputs.suggestedBy),
    ]);

    return h('div', { class: 'admin-card' }, [
      header,
      h('div', { class: 'admin-row' }, [
        h('img', { class: 'admin-thumb', src: s.header_image || '', alt: s.title || '' }),
        h('div', { class: 'admin-fields' }, [
          fields,
          field('Description (Danish)', inputs.descriptionDa),
          field('Description (English)', inputs.descriptionEn),
          field('Pitch', inputs.pitch),
          actions,
          msg,
        ]),
      ]),
    ]);
  }

  // ── votes / ballots (who voted for what; remove a ballot) ──────────────────
  function renderBallots(ballots, suggestions) {
    var wrap = $('ballots');
    wrap.innerHTML = '';
    var titles = {};
    suggestions.forEach(function (s) { titles[s.id] = s.title; });

    var totalApprovals = ballots.reduce(function (n, b) { return n + b.suggestionIds.length; }, 0);
    wrap.appendChild(h('p', { class: 'admin-meta', text: ballots.length + ' ballots · ' + totalApprovals + ' total approvals' }));

    if (!ballots.length) {
      wrap.appendChild(h('div', { class: 'admin-card' }, [h('p', { class: 'admin-meta', text: 'No votes yet.' })]));
      return;
    }

    ballots.forEach(function (b) {
      // Titles come from Steam; voterName is self-reported. Render via textContent
      // (h's `text`) — never innerHTML — so a crafted name can't XSS this admin view.
      var games = b.suggestionIds.map(function (id) { return titles[id] || ('#' + id); }).join(', ');
      var msg = h('div', { class: 'admin-msg', hidden: 'hidden' });

      var del = h('button', { class: 'admin-btn danger', onclick: function () {
        if (!confirm('Remove this ballot? Its votes will be deleted.')) return;
        authedFetch('/ballot/' + encodeURIComponent(b.ballotId), { method: 'DELETE' })
          .then(function () { load(); })
          .catch(function (e) { showMsg(msg, e.message, false); });
      } }, ['Remove ballot']);

      var head = h('div', { class: 'admin-actions', style: 'justify-content:space-between;margin-bottom:6px' }, [
        h('span', null, [
          h('b', { text: b.voterName || 'anonymous' }),
          h('span', { class: 'admin-meta', style: 'margin-left:8px', text: b.createdAt || '' }),
        ]),
        del,
      ]);

      wrap.appendChild(h('div', { class: 'admin-card' }, [
        head,
        h('p', { class: 'admin-meta', style: 'margin:0', text: 'Approved: ' + games }),
        msg,
      ]));
    });
  }

  // ── open new round ─────────────────────────────────────────────────────────
  $('open-round').addEventListener('click', function () {
    var msg = $('new-round-msg');
    authedFetch('/round', {
      method: 'POST',
      body: JSON.stringify({
        id: $('nr-id').value,
        stormCode: $('nr-code').value,
        title: $('nr-title').value,
        meetingDate: $('nr-meeting-date').value,
        suggestionsOpenMonthsBefore: $('nr-suggestions-months').value,
        votingClosesMonthsBefore: $('nr-voting-months').value,
        suggestionsOpenAt: $('nr-suggestions-open').value,
        votingClosesAt: $('nr-closes').value,
      }),
    }).then(function () {
      showMsg(msg, 'Round opened.', true);
      $('nr-id').value = $('nr-code').value = $('nr-title').value = $('nr-meeting-date').value = $('nr-suggestions-open').value = $('nr-closes').value = '';
      $('nr-suggestions-months').value = '2.5';
      $('nr-voting-months').value = '2';
      toggleNewRound(false);
      currentRoundId = null;
      load();
    }).catch(function (e) { showMsg(msg, e.message, false); });
  });

  $('round-select').addEventListener('change', function () {
    var id = Number(this.value);
    if (id) loadRound(id);
  });

  function updateNewRoundScheduleDefaults() {
    var schedule = defaultScheduleForMeetingDate($('nr-meeting-date').value, $('nr-suggestions-months').value, $('nr-voting-months').value);
    $('nr-suggestions-open').value = schedule.suggestionsOpenAt;
    $('nr-closes').value = schedule.votingClosesAt;
  }

  $('nr-meeting-date').addEventListener('change', updateNewRoundScheduleDefaults);
  $('nr-suggestions-months').addEventListener('change', updateNewRoundScheduleDefaults);
  $('nr-voting-months').addEventListener('change', updateNewRoundScheduleDefaults);

  function toggleNewRound(show) {
    var panel = $('new-round-panel');
    var btn = $('btn-new-round');
    var open = show != null ? show : panel.hidden;
    panel.hidden = !open;
    btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    btn.classList.toggle('active', open);
    if (open) {
      $('new-round-msg').hidden = true;
      panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      $('nr-id').focus();
    }
  }

  $('btn-new-round').addEventListener('click', function () { toggleNewRound(); });
  $('nr-cancel').addEventListener('click', function () { toggleNewRound(false); });

  $('connect').addEventListener('click', connect);
  $('token').addEventListener('keydown', function (e) { if (e.key === 'Enter') connect(); });

  if (token) { $('token').value = token; load(); }
})();
</script>

</body>
</html>
